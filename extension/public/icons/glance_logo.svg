    <line x1="-40" y1="-78" x2="-42" y2="-92" stroke="#4338CA" stroke-width="2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(67, 56, 202);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="0" y1="-90" x2="0" y2="-106" stroke="#4338CA" stroke-width="2.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(67, 56, 202);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="40" y1="-78" x2="42" y2="-92" stroke="#4338CA" stroke-width="2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(67, 56, 202);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="70" y1="-38" x2="78" y2="-50" stroke="#4338CA" stroke-width="2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(67, 56, 202);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- scan line across iris — AI scanning effect -->
    <line x1="-60" y1="14" x2="60" y2="14" stroke="#A5B4FC" stroke-width="1.5" stroke-linecap="round" opacity="0.55" stroke-dasharray="4 3" style="fill:rgb(0, 0, 0);stroke:rgb(165, 180, 252);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-dasharray:4px, 3px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  </g>

  <!-- wordmark -->
  <text x="340" y="352" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="58" font-weight="600" letter-spacing="-1" style="fill:rgb(224, 231, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:58px;font-weight:600;text-anchor:middle;dominant-baseline:auto">
