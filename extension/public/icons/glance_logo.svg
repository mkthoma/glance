    <line x1="35" y1="35" x2="43" y2="43" stroke="#818CF8" stroke-width="1" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(129, 140, 248);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
