  <text x="340" y="388" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="400" letter-spacing="4" style="fill:rgb(129, 140, 248);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, -apple-system, sans-serif;font-size:13px;font-weight:400;text-anchor:middle;dominant-baseline:auto">AI PAGE INTELLIGENCE</text>

  <!-- subtle arc underline beneath wordmark -->
  <path d="M 258,400 Q 340,418 422,400" fill="none" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round" opacity="0.4" style="fill:none;stroke:rgb(99, 102, 241);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

