    <!-- outer eye whites / surround -->
    <!-- eye outline path: classic almond/eye shape -->
    <path d="M -130,0 C -90,-62 -40,-90 0,-90 C 40,-90 90,-62 130,0 C 90,62 40,90 0,90 C -40,90 -90,62 -130,0 Z" fill="#EEF2FF" stroke="#4338CA" stroke-width="3" style="fill:rgb(238, 242, 255);stroke:rgb(67, 56, 202);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- iris ring outer -->
    <circle cx="0" cy="0" r="62" fill="#4338CA" style="fill:rgb(67, 56, 202);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- iris ring mid — slightly lighter -->
    <circle cx="0" cy="0" r="50" fill="#4F46E5" style="fill:rgb(79, 70, 229);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- iris texture: thin concentric arcs (top half only for depth) -->
    <path d="M -44,0 A 44,44 0 0 1 44,0" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.6" style="fill:none;stroke:rgb(99, 102, 241);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M -36,0 A 36,36 0 0 1 36,0" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.5" style="fill:none;stroke:rgb(99, 102, 241);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M -28,0 A 28,28 0 0 1 28,0" fill="none" stroke="#818CF8" stroke-width="1" opacity="0.4" style="fill:none;stroke:rgb(129, 140, 248);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

